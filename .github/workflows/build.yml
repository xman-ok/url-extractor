name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    steps:
    # Node 24 환경을 지원하는 최신 빌드 액션 버전으로 교체 완료
    - name: 코드 가져오기
      uses: actions/checkout@v4.2.2

    # Node 24 환경을 지원하는 최신 파이썬 세팅 버전으로 교체 완료
    - name: 파이썬 설치
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py

    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
