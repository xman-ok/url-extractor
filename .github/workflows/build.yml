name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    steps:
    # 1. Node 24 완벽 지원 메이저 버전
    - name: 코드 가져오기
      uses: actions/checkout@v5

    # 2. Node 24 완벽 지원 메이저 버전
    - name: 파이썬 설치
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py

    # 3. [핵심 수정] Node 24 호환 모듈인 v4.6.0 최신 규격으로 업그레이드
    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4.6.0
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
