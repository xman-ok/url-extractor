name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    steps:
    # 1. Node 24를 완전 공식 지원하는 완전히 새로운 메이저 버전 v5로 전면 교체
    - name: 코드 가져오기
      uses: actions/checkout@v5

    # 2. Node 24 환경 충돌 문제를 근본적으로 해결한 완전히 새로운 메이저 버전 v6로 전면 교체
    - name: 파이썬 설치
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py


    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4.4.0  # <- 세부 패치 버전 명시 완료
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
