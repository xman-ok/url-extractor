name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    # [핵심 수정] 깃허브 공식 문서 가이드 반영
    # 내부 액션들을 Node 24 환경으로 강제 수용시켜 경고 메시지를 완전히 소멸시킵니다.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v5

    - name: 파이썬 설치
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py

    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4.6.0
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
