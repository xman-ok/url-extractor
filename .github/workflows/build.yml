name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    steps:
    # 1. Node 24 정식 지원 메이저 버전
    - name: 코드 가져오기
      uses: actions/checkout@v5

    # 2. Node 24 정식 지원 메이저 버전
    - name: 파이썬 설치
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      # --hidden-import 대신 --collect-all을 쓰면 내부 바이너리(Selenium Manager)까지 한방에 묶입니다.
      run: |
        pyinstaller --onefile --windowed --collect-all selenium main.py

    # 3. [핵심 수정] Node 24 환경을 완벽하게 정식 수용하는 v6 정식 버전으로 변경
    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v6
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
