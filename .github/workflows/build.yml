name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v5

    - name: 파이썬 설치
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      # [핵심 수정] 파이엔스톨러가 셀레니움 내부 가상 옵션을 누락시키지 않도록 강제 포장 명령 추가
      run: |
        pyinstaller --onefile --windowed --hidden-import=selenium.webdriver.chrome.options --hidden-import=selenium.webdriver.common.by main.py

    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4.6.0
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
