name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    # [핵심 수정] 깃허브 서버에 Node 20 계열 액션을 안전하게 강제 허용하는 환경 설정 주입
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py

    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
