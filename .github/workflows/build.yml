name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 버튼을 눌러서 수동으로도 실행 가능하게 설정

jobs:
  build:
    runs-on: windows-latest # 마이크로소프트의 윈도우 클라우드 컴퓨터를 빌림

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py

    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
