name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    steps:
    - name: 코드 가져오기
      uses: actions/checkout@v5

    - name: 파이썬 설치
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed --hidden-import=selenium --hidden-import=selenium.webdriver --hidden-import=selenium.webdriver.chrome.webdriver --hidden-import=selenium.webdriver.chrome.options --hidden-import=selenium.webdriver.common.by main.py

    # [핵심 수정] Node 24와 100% 호환되어 경고를 발생시키지 않는 최신 업로드 표준 포맷으로 전면 개편
    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4-node24
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
