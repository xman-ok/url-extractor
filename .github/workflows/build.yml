name: Build EXE File

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest 

    steps:
    # 1. Node 24를 공식 지원하는 초최신 릴리즈 패치 버전으로 완전히 강제 지정
    - name: 코드 가져오기
      uses: actions/checkout@v4.2.2

    # 2. Node 24 환경에서 에러 없이 실행되는 최신 정식 버전으로 변경
    - name: 파이썬 설치
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install openpyxl pyinstaller selenium requests

    - name: EXE 파일로 빌드
      run: |
        pyinstaller --onefile --windowed main.py

    - name: 완성된 파일 업로드
      uses: actions/upload-artifact@v4
      with:
        name: URL_Link_Extractor_EXE
        path: dist/main.exe
